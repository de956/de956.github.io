---
layout: default
---

<div class="row">
  <div class="col-md-8">
    <article class="post">
      <div class="post-content" itemprop="articleBody">{{ content }}</div>
    </article>

    <div class="next-previous-articles">
      <nav aria-label="">
        <ul class="pagination">

          {% if page.next.url %}
          <li class="page-item">
            <a class="page-link" href="{{page.next.url}}" tabindex="-1">&laquo; {{page.next.title}}</a>
          </li>
          {% endif %} 
          
          {% if page.previous.url %}
          <li class="page-item">
            <a class="page-link" href="{{page.previous.url}}">{{page.previous.title}} &raquo;</a>
          </li>
          {% endif %}

        </ul>
      </nav>
    </div>
  </div>
</div>
